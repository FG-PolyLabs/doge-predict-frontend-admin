{{ define "main" }}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h2 class="h5 mb-0 fw-semibold">{{ .Title }}</h2>
  <div class="d-flex gap-2">
    <button class="btn btn-outline-secondary btn-sm" id="btn-sync" onclick="syncTokens()" title="Sync to GCS / GitHub">
      <i class="bi bi-arrow-repeat me-1"></i>Sync
    </button>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#tokenModal" onclick="openCreateModal()">
      <i class="bi bi-plus-lg me-1"></i>New Token
    </button>
  </div>
</div>

<!-- Source selector -->
<div class="mb-3">
  <div class="btn-group btn-group-sm" role="group">
    <input type="radio" class="btn-check" name="source" id="src-github" value="github" checked>
    <label class="btn btn-outline-secondary" for="src-github"><i class="bi bi-github me-1"></i>GitHub</label>
    <input type="radio" class="btn-check" name="source" id="src-gcs" value="gcs">
    <label class="btn btn-outline-secondary" for="src-gcs"><i class="bi bi-cloud me-1"></i>GCS</label>
    <input type="radio" class="btn-check" name="source" id="src-api" value="api">
    <label class="btn btn-outline-secondary" for="src-api"><i class="bi bi-hdd-network me-1"></i>API</label>
  </div>
  <span class="badge bg-light text-dark ms-2" id="source-badge"></span>
</div>

<!-- Auth guard -->
<div id="auth-guard" class="alert alert-warning d-none">
  <i class="bi bi-lock me-1"></i>You must be <a href="{{ "" | relURL }}">signed in</a> to manage tokens.
</div>

<!-- Loading -->
<div id="loading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status"></div>
</div>

<!-- Empty state -->
<div id="empty-state" class="text-center py-5 d-none">
  <i class="bi bi-coin fs-1 text-muted"></i>
  <p class="text-muted mt-2">No tracked tokens yet. Add your first one!</p>
</div>

<!-- Tokens table -->
<div class="card shadow-sm border-0 d-none" id="tokens-card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">Symbol</th>
            <th>Name</th>
            <th>Platform</th>
            <th>Status</th>
            <th class="text-end pe-3">Actions</th>
          </tr>
        </thead>
        <tbody id="tokens-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal fade" id="tokenModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="modal-title">New Token</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="token-id">
        <div class="mb-3">
          <label class="form-label small fw-medium" for="token-symbol">Symbol</label>
          <input type="text" class="form-control" id="token-symbol" placeholder="BTC" required>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-medium" for="token-name">Name</label>
          <input type="text" class="form-control" id="token-name" placeholder="Bitcoin">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-medium" for="token-platform">Platform</label>
          <select class="form-select" id="token-platform">
            <option value="coingecko">CoinGecko</option>
            <option value="binance">Binance</option>
            <option value="coinbase">Coinbase</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-medium" for="token-coingecko-id">CoinGecko ID</label>
          <input type="text" class="form-control" id="token-coingecko-id" placeholder="bitcoin">
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="token-active" checked>
          <label class="form-check-label" for="token-active">Active</label>
        </div>
        <div id="modal-error" class="alert alert-danger py-2 small d-none"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="modal-save-btn" onclick="saveToken()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content border-0 shadow">
      <div class="modal-body text-center pt-4">
        <i class="bi bi-trash3 fs-2 text-danger"></i>
        <p class="mt-2 mb-1 fw-medium">Delete this token?</p>
        <p class="text-muted small">This cannot be undone.</p>
      </div>
      <div class="modal-footer border-0 justify-content-center pt-0 pb-3">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script>
  const RESOURCE_PATH = '/tokens';
  const DATA_FILE = 'tracked_tokens.json';

  const tokenModal  = new bootstrap.Modal(document.getElementById('tokenModal'));
  const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

  let currentSource = 'github';

  document.querySelectorAll('input[name="source"]').forEach(radio => {
    radio.addEventListener('change', e => { currentSource = e.target.value; loadTokens(); });
  });

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('auth-guard').classList.remove('d-none');
      return;
    }
    document.getElementById('btn-resources')?.classList.remove('d-none');
    await loadTokens();
  });

  async function loadTokens() {
    const badge = document.getElementById('source-badge');
    document.getElementById('loading').classList.remove('d-none');
    document.getElementById('tokens-card').classList.add('d-none');
    document.getElementById('empty-state').classList.add('d-none');

    try {
      let tokens;
      if (currentSource === 'api') {
        tokens = await api('GET', RESOURCE_PATH);
        badge.textContent = 'Live API';
      } else if (currentSource === 'gcs') {
        const { gcsBucket } = window.DATA_CONFIG || {};
        const res = await fetch(`https://storage.googleapis.com/${gcsBucket}/${DATA_FILE}?t=${Date.now()}`);
        tokens = await res.json();
        badge.textContent = 'GCS (read-only)';
      } else {
        tokens = await loadJsonData(DATA_FILE);
        badge.textContent = 'GitHub (read-only)';
      }

      document.getElementById('loading').classList.add('d-none');
      if (!tokens || tokens.length === 0) {
        document.getElementById('empty-state').classList.remove('d-none');
        return;
      }
      renderTokens(tokens);
      document.getElementById('tokens-card').classList.remove('d-none');
    } catch (e) {
      document.getElementById('loading').classList.add('d-none');
      showToast('Failed to load tokens: ' + e.message, 'danger');
    }
  }

  function renderTokens(tokens) {
    const tbody = document.getElementById('tokens-tbody');
    tbody.innerHTML = tokens.map(t => `
      <tr>
        <td class="ps-3 fw-medium">${escHtml(t.symbol)}</td>
        <td>${escHtml(t.name || '—')}</td>
        <td><span class="badge bg-light text-dark">${escHtml(t.platform || '—')}</span></td>
        <td>${t.active !== false
              ? '<span class="badge bg-success-subtle text-success">Active</span>'
              : '<span class="badge bg-secondary-subtle text-secondary">Inactive</span>'}</td>
        <td class="text-end pe-3">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick='openEditModal(${JSON.stringify(t)})'>
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal('${t.id || t.symbol}')">
            <i class="bi bi-trash3"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function openCreateModal() {
    document.getElementById('modal-title').textContent = 'New Token';
    document.getElementById('token-id').value = '';
    document.getElementById('token-symbol').value = '';
    document.getElementById('token-name').value = '';
    document.getElementById('token-coingecko-id').value = '';
    document.getElementById('token-active').checked = true;
    document.getElementById('modal-error').classList.add('d-none');
  }

  function openEditModal(t) {
    document.getElementById('modal-title').textContent = 'Edit Token';
    document.getElementById('token-id').value = t.id || t.symbol;
    document.getElementById('token-symbol').value = t.symbol;
    document.getElementById('token-name').value = t.name || '';
    document.getElementById('token-platform').value = t.platform || 'coingecko';
    document.getElementById('token-coingecko-id').value = t.coingecko_id || '';
    document.getElementById('token-active').checked = t.active !== false;
    document.getElementById('modal-error').classList.add('d-none');
    tokenModal.show();
  }

  async function saveToken() {
    const id           = document.getElementById('token-id').value;
    const symbol       = document.getElementById('token-symbol').value.trim().toUpperCase();
    const name         = document.getElementById('token-name').value.trim();
    const platform     = document.getElementById('token-platform').value;
    const coingecko_id = document.getElementById('token-coingecko-id').value.trim();
    const active       = document.getElementById('token-active').checked;
    const errEl        = document.getElementById('modal-error');
    errEl.classList.add('d-none');

    if (!symbol) { errEl.textContent = 'Symbol is required.'; errEl.classList.remove('d-none'); return; }

    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true;
    try {
      const body = { symbol, name, platform, coingecko_id, active };
      if (id) {
        await api('PUT', `${RESOURCE_PATH}/${id}`, body);
      } else {
        await api('POST', RESOURCE_PATH, body);
      }
      tokenModal.hide();
      currentSource = 'api';
      document.getElementById('src-api').checked = true;
      await loadTokens();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('d-none');
    } finally {
      btn.disabled = false;
    }
  }

  let pendingDeleteId = null;
  function openDeleteModal(id) { pendingDeleteId = id; deleteModal.show(); }

  document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
    if (!pendingDeleteId) return;
    try {
      await api('DELETE', `${RESOURCE_PATH}/${pendingDeleteId}`);
      deleteModal.hide();
      currentSource = 'api';
      document.getElementById('src-api').checked = true;
      await loadTokens();
    } catch (e) { showToast('Delete failed: ' + e.message, 'danger'); }
  });

  async function syncTokens() {
    const btn = document.getElementById('btn-sync');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin me-1"></i>Syncing...';
    try {
      await api('POST', '/sync/tokens');
      showToast('Tokens synced to GCS and GitHub.', 'success');
    } catch (e) { showToast('Sync failed: ' + e.message, 'danger'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>Sync'; }
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }
</script>
{{ end }}
