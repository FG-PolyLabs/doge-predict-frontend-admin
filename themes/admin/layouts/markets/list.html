{{ define "main" }}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h2 class="h5 mb-0 fw-semibold">{{ .Title }}</h2>
  <div class="d-flex gap-2">
    <button class="btn btn-outline-secondary btn-sm" id="btn-discover" onclick="discoverMarkets()">
      <i class="bi bi-search me-1"></i>Discover
    </button>
    <button class="btn btn-outline-secondary btn-sm" id="btn-sync" onclick="syncMarkets()">
      <i class="bi bi-arrow-repeat me-1"></i>Sync
    </button>
  </div>
</div>

<!-- Source selector -->
<div class="mb-3">
  <div class="btn-group btn-group-sm" role="group">
    <input type="radio" class="btn-check" name="source" id="src-github" value="github" checked>
    <label class="btn btn-outline-secondary" for="src-github"><i class="bi bi-github me-1"></i>GitHub</label>
    <input type="radio" class="btn-check" name="source" id="src-gcs" value="gcs">
    <label class="btn btn-outline-secondary" for="src-gcs"><i class="bi bi-cloud me-1"></i>GCS</label>
    <input type="radio" class="btn-check" name="source" id="src-api" value="api">
    <label class="btn btn-outline-secondary" for="src-api"><i class="bi bi-hdd-network me-1"></i>API</label>
  </div>
  <span class="badge bg-light text-dark ms-2" id="source-badge"></span>
</div>

<!-- Category filter -->
<div class="mb-3">
  <div class="btn-group btn-group-sm" role="group">
    <input type="radio" class="btn-check" name="cat" id="cat-all" value="all" checked>
    <label class="btn btn-outline-primary" for="cat-all">All</label>
    <input type="radio" class="btn-check" name="cat" id="cat-daily" value="crypto_daily">
    <label class="btn btn-outline-primary" for="cat-daily">Daily</label>
    <input type="radio" class="btn-check" name="cat" id="cat-weekly" value="crypto_weekly">
    <label class="btn btn-outline-primary" for="cat-weekly">Weekly</label>
  </div>
</div>

<!-- Auth guard -->
<div id="auth-guard" class="alert alert-warning d-none">
  <i class="bi bi-lock me-1"></i>You must be <a href="{{ "" | relURL }}">signed in</a> to manage markets.
</div>

<!-- Loading -->
<div id="loading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status"></div>
</div>

<!-- Empty state -->
<div id="empty-state" class="text-center py-5 d-none">
  <i class="bi bi-shop fs-1 text-muted"></i>
  <p class="text-muted mt-2">No markets tracked yet. Click <strong>Discover</strong> to find Polymarket crypto markets.</p>
</div>

<!-- Markets table -->
<div class="card shadow-sm border-0 d-none" id="markets-card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">Market</th>
            <th>Category</th>
            <th class="text-center">YES</th>
            <th class="text-center">NO</th>
            <th class="text-center">Spread</th>
            <th class="text-end pe-3">Actions</th>
          </tr>
        </thead>
        <tbody id="markets-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Price history modal -->
<div class="modal fade" id="chartModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="chart-title">Price History</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <div class="btn-group btn-group-sm" role="group">
            <button class="btn btn-outline-secondary active" onclick="setChartRange('24h', this)">24h</button>
            <button class="btn btn-outline-secondary" onclick="setChartRange('48h', this)">48h</button>
            <button class="btn btn-outline-secondary" onclick="setChartRange('7d', this)">7d</button>
          </div>
        </div>
        <canvas id="priceChart" height="300"></canvas>
        <div class="row mt-3" id="chart-stats">
          <div class="col-4 text-center">
            <div class="text-muted small">Best Bid</div>
            <div class="fw-medium" id="stat-bid">—</div>
          </div>
          <div class="col-4 text-center">
            <div class="text-muted small">Best Ask</div>
            <div class="fw-medium" id="stat-ask">—</div>
          </div>
          <div class="col-4 text-center">
            <div class="text-muted small">Spread</div>
            <div class="fw-medium" id="stat-spread">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

<script>
  const MARKETS_FILE = 'tracked_markets.json';
  const SNAPSHOTS_FILE = 'market_snapshots.json';

  const chartModal = new bootstrap.Modal(document.getElementById('chartModal'));
  let priceChart = null;
  let allMarkets = [];
  let allSnapshots = [];
  let currentSource = 'github';
  let currentCategory = 'all';
  let currentChartMarket = null;

  document.querySelectorAll('input[name="source"]').forEach(r => {
    r.addEventListener('change', e => { currentSource = e.target.value; loadData(); });
  });
  document.querySelectorAll('input[name="cat"]').forEach(r => {
    r.addEventListener('change', e => { currentCategory = e.target.value; renderMarkets(); });
  });

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('auth-guard').classList.remove('d-none');
      return;
    }
    document.getElementById('btn-resources')?.classList.remove('d-none');
    await loadData();
  });

  async function loadData() {
    const badge = document.getElementById('source-badge');
    document.getElementById('loading').classList.remove('d-none');
    document.getElementById('markets-card').classList.add('d-none');
    document.getElementById('empty-state').classList.add('d-none');

    try {
      if (currentSource === 'api') {
        allMarkets = await api('GET', '/markets');
        badge.textContent = 'Live API';
      } else {
        allMarkets = await loadJsonData(MARKETS_FILE);
        badge.textContent = currentSource === 'gcs' ? 'GCS (read-only)' : 'GitHub (read-only)';
      }

      // Try loading snapshots for orderbook data
      try {
        if (currentSource === 'api') {
          allSnapshots = await api('GET', '/markets/snapshots/latest');
        } else {
          allSnapshots = await loadJsonData(SNAPSHOTS_FILE);
        }
      } catch (_) { allSnapshots = []; }

    } catch (e) {
      allMarkets = [];
      showToast('Failed to load markets: ' + e.message, 'danger');
    }

    document.getElementById('loading').classList.add('d-none');
    renderMarkets();
  }

  function renderMarkets() {
    let markets = allMarkets;
    if (currentCategory !== 'all') {
      markets = markets.filter(m => m.category === currentCategory);
    }

    if (!markets || markets.length === 0) {
      document.getElementById('empty-state').classList.remove('d-none');
      document.getElementById('markets-card').classList.add('d-none');
      return;
    }

    document.getElementById('empty-state').classList.add('d-none');
    document.getElementById('markets-card').classList.remove('d-none');

    const tbody = document.getElementById('markets-tbody');
    tbody.innerHTML = markets.map(m => {
      const yesPrice = m.outcome_yes_price || 0;
      const noPrice = m.outcome_no_price || 0;

      // Find latest snapshot with orderbook data for this market
      const latestSnap = allSnapshots
        .filter(s => s.market_slug === m.slug && s.outcome_tag === 'yes' && s.best_bid)
        .sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''))[0];

      const spread = latestSnap ? latestSnap.spread : null;
      const spreadDisplay = spread != null
        ? `<span class="${spread > 0.03 ? 'text-danger' : 'text-success'}">${(spread * 100).toFixed(1)}¢</span>`
        : '<span class="text-muted">—</span>';

      const catBadge = m.category === 'crypto_daily'
        ? '<span class="badge bg-primary-subtle text-primary">Daily</span>'
        : '<span class="badge bg-info-subtle text-info">Weekly</span>';

      return `
        <tr>
          <td class="ps-3">
            <div class="fw-medium">${escHtml(m.title || m.slug)}</div>
            <div class="text-muted small">${escHtml(m.slug)}</div>
          </td>
          <td>${catBadge}</td>
          <td class="text-center">
            <span class="badge bg-success-subtle text-success fs-6">${(yesPrice * 100).toFixed(1)}¢</span>
          </td>
          <td class="text-center">
            <span class="badge bg-danger-subtle text-danger fs-6">${(noPrice * 100).toFixed(1)}¢</span>
          </td>
          <td class="text-center">${spreadDisplay}</td>
          <td class="text-end pe-3">
            <button class="btn btn-sm btn-outline-primary" onclick="showChart('${escAttr(m.slug)}', '${escAttr(m.title || m.slug)}')">
              <i class="bi bi-graph-up"></i>
            </button>
          </td>
        </tr>
      `;
    }).join('');
  }

  async function showChart(slug, title) {
    document.getElementById('chart-title').textContent = title;
    chartModal.show();

    // Find snapshot data for this market
    currentChartMarket = slug;
    await renderChart('24h');
  }

  function setChartRange(range, btn) {
    document.querySelectorAll('#chartModal .btn-group .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderChart(range);
  }

  async function renderChart(range) {
    const slug = currentChartMarket;
    const hours = range === '7d' ? 168 : range === '48h' ? 48 : 24;
    const cutoff = new Date(Date.now() - hours * 3600000).toISOString();

    // Filter snapshots for this market
    const snaps = allSnapshots
      .filter(s => s.market_slug === slug && s.timestamp >= cutoff)
      .sort((a, b) => a.timestamp.localeCompare(b.timestamp));

    const yesData = snaps.filter(s => s.outcome_tag === 'yes').map(s => ({ x: new Date(s.timestamp), y: s.price }));
    const noData = snaps.filter(s => s.outcome_tag === 'no').map(s => ({ x: new Date(s.timestamp), y: s.price }));

    // Update stats from latest snapshot with orderbook data
    const latestWithBook = snaps
      .filter(s => s.outcome_tag === 'yes' && s.best_bid)
      .sort((a, b) => b.timestamp.localeCompare(a.timestamp))[0];

    if (latestWithBook) {
      document.getElementById('stat-bid').textContent = (latestWithBook.best_bid * 100).toFixed(1) + '¢';
      document.getElementById('stat-ask').textContent = (latestWithBook.best_ask * 100).toFixed(1) + '¢';
      document.getElementById('stat-spread').textContent = (latestWithBook.spread * 100).toFixed(1) + '¢';
    } else {
      document.getElementById('stat-bid').textContent = '—';
      document.getElementById('stat-ask').textContent = '—';
      document.getElementById('stat-spread').textContent = '—';
    }

    // Render chart
    const ctx = document.getElementById('priceChart').getContext('2d');
    if (priceChart) priceChart.destroy();

    priceChart = new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [
          {
            label: 'YES',
            data: yesData,
            borderColor: '#198754',
            backgroundColor: 'rgba(25,135,84,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 1,
            borderWidth: 2,
          },
          {
            label: 'NO',
            data: noData,
            borderColor: '#dc3545',
            backgroundColor: 'rgba(220,53,69,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 1,
            borderWidth: 2,
          },
        ],
      },
      options: {
        responsive: true,
        interaction: { intersect: false, mode: 'index' },
        scales: {
          x: {
            type: 'time',
            time: { tooltipFormat: 'MMM d, HH:mm' },
            title: { display: false },
          },
          y: {
            min: 0, max: 1,
            title: { display: true, text: 'Price (probability)' },
            ticks: { callback: v => (v * 100).toFixed(0) + '¢' },
          },
        },
        plugins: {
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${(ctx.parsed.y * 100).toFixed(1)}¢`,
            },
          },
        },
      },
    });
  }

  async function discoverMarkets() {
    const btn = document.getElementById('btn-discover');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-search spin me-1"></i>Discovering...';
    try {
      await api('POST', '/markets/discover');
      showToast('Market discovery triggered.', 'success');
      currentSource = 'api';
      document.getElementById('src-api').checked = true;
      await loadData();
    } catch (e) { showToast('Discovery failed: ' + e.message, 'danger'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-search me-1"></i>Discover'; }
  }

  async function syncMarkets() {
    const btn = document.getElementById('btn-sync');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin me-1"></i>Syncing...';
    try {
      await api('POST', '/sync/markets');
      showToast('Markets synced.', 'success');
    } catch (e) { showToast('Sync failed: ' + e.message, 'danger'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>Sync'; }
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }
  function escAttr(str) {
    return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }
</script>
{{ end }}
