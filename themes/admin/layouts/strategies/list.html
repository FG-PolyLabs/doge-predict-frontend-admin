{{ define "main" }}
<h2 class="h5 mb-4 fw-semibold">{{ .Title }}</h2>

<div id="auth-guard" class="alert alert-warning d-none">
  <i class="bi bi-lock me-1"></i>You must be <a href="{{ "" | relURL }}">signed in</a>.
</div>

<div id="loading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status"></div>
</div>

<div id="strats-list" class="d-none"></div>
{{ end }}

{{ define "page-scripts" }}
<script>
  firebase.auth().onAuthStateChanged(async user => {
    if (!user) { document.getElementById('loading').classList.add('d-none'); document.getElementById('auth-guard').classList.remove('d-none'); return; }
    await loadStrategies();
  });

  async function loadStrategies() {
    try {
      const strats = await api('GET', '/strategies');
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('strats-list').classList.remove('d-none');

      document.getElementById('strats-list').innerHTML = strats.map(s => {
        const paramsDesc = s.params.map(p => `${p.label}: ${p.default}`).join(', ');
        return `
        <div class="card shadow-sm border-0 mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h6 class="fw-semibold mb-1">${escHtml(s.name)}</h6>
                <p class="text-muted small mb-1">${escHtml(s.description)}</p>
                <span class="text-muted small">Default params: ${escHtml(paramsDesc)}</span>
              </div>
              <a href="{{ "backtests/" | relURL }}?strategy=${s.id}" class="btn btn-sm btn-success">
                <i class="bi bi-play-fill me-1"></i>Run Backtest
              </a>
            </div>
          </div>
        </div>`;
      }).join('');
    } catch (e) {
      document.getElementById('loading').classList.add('d-none');
      showToast(e.message, 'danger');
    }
  }

  function escHtml(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
</script>
{{ end }}
