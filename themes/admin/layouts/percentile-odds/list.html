{{ define "main" }}
<h2 class="h5 mb-2 fw-semibold">{{ .Title }}</h2>
<p class="text-muted mb-3">Which price percentile positions yield the best betting odds?</p>

<div id="auth-guard" class="alert alert-warning d-none">
  <i class="bi bi-lock me-1"></i>You must be <a href="{{ "" | relURL }}">signed in</a>.
</div>
<div id="loading" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>

<div id="content" class="d-none">
  <!-- Market type tabs -->
  <ul class="nav nav-pills mb-4" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-daily">Daily Markets</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-4h">4h Markets</button></li>
  </ul>

  <!-- Ticker selector -->
  <div class="mb-3">
    <select class="form-select" style="width:200px;display:inline-block" id="ticker-select" onchange="renderAll()"></select>
    <span class="text-muted small ms-2" id="current-label"></span>
  </div>

  <div class="tab-content">
    <!-- Daily tab -->
    <div class="tab-pane fade show active" id="tab-daily">
      <div class="row g-4" id="daily-grids"></div>
    </div>

    <!-- 4h tab -->
    <div class="tab-pane fade" id="tab-4h">
      <div class="row g-4" id="fourh-grids"></div>
    </div>
  </div>

  <!-- Insights -->
  <div class="card shadow-sm border-0 mt-4">
    <div class="card-header bg-white fw-medium">Key Insights</div>
    <div class="card-body" id="insights"></div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
  const DAILY_TIMEFRAMES = ['52w', '90d', '31d', '7d'];
  const FOURH_TIMEFRAMES = ['52w', '90d', '31d', '7d', '24h'];
  const LABELS = {
    '52w': '52-Week', '90d': '90-Day (Quarter)', '31d': '31-Day (Month)',
    '7d': '7-Day (Week)', '24h': '24-Hour'
  };

  let dailyData = {}, fourhData = {}, currentDaily = [], current4h = [];
  let charts = {};

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) { document.getElementById('loading').classList.add('d-none'); document.getElementById('auth-guard').classList.remove('d-none'); return; }
    await loadData();
  });

  async function loadData() {
    try {
      // Fetch all in parallel
      const promises = [
        ...DAILY_TIMEFRAMES.map(tf =>
          api('GET', tf === '52w' ? '/dashboard/percentile-updown' : `/dashboard/percentile-updown-${tf}`)
            .then(d => { dailyData[tf] = d; })
        ),
        ...FOURH_TIMEFRAMES.map(tf =>
          api('GET', `/dashboard/percentile-4h/${tf}`)
            .then(d => { fourhData[tf] = d; })
        ),
        api('GET', '/dashboard/current-percentiles').then(d => { currentDaily = d; }),
        api('GET', '/dashboard/percentile-4h-current').then(d => { current4h = d; }),
      ];
      await Promise.all(promises);

      document.getElementById('loading').classList.add('d-none');
      document.getElementById('content').classList.remove('d-none');

      // Ticker selector
      const tickers = [...new Set((dailyData['52w'] || []).map(r => r.ticker))].sort();
      const sel = document.getElementById('ticker-select');
      sel.innerHTML = tickers.map(t => `<option value="${t}">${t.toUpperCase()}</option>`).join('');
      sel.value = 'btc';

      // Build grid containers
      buildGridContainers('daily-grids', DAILY_TIMEFRAMES);
      buildGridContainers('fourh-grids', FOURH_TIMEFRAMES);

      renderAll();
    } catch (e) {
      document.getElementById('loading').classList.add('d-none');
      showToast('Failed to load: ' + e.message, 'danger');
    }
  }

  function buildGridContainers(parentId, timeframes) {
    const parent = document.getElementById(parentId);
    parent.innerHTML = timeframes.map(tf => `
      <div class="col-md-6">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-header bg-white fw-medium small">${LABELS[tf]}</div>
          <div class="card-body p-0">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-light">
                <tr><th class="ps-2">%ile</th><th class="text-end">Days</th><th class="text-end">Up</th><th class="text-end">Dn</th><th class="text-end pe-2">Up%</th></tr>
              </thead>
              <tbody id="grid-${parentId}-${tf}"></tbody>
            </table>
          </div>
          <div class="card-footer bg-white p-2"><canvas id="chart-${parentId}-${tf}" height="120"></canvas></div>
        </div>
      </div>
    `).join('');
  }

  function renderAll() {
    const ticker = document.getElementById('ticker-select').value;

    // Update current label
    const cd = currentDaily.find(c => c.ticker === ticker);
    const c4 = current4h.find(c => c.ticker === ticker);
    if (cd) {
      document.getElementById('current-label').textContent =
        `Now: 52w=${cd.pctile_52w}% | 90d=${cd.pctile_90d}% | 31d=${cd.pctile_31d}% | 7d=${cd.pctile_7d || '?'}%`;
    }

    // Render daily grids
    for (const tf of DAILY_TIMEFRAMES) {
      const rows = (dailyData[tf] || []).filter(r => r.ticker === ticker);
      renderGrid(`grid-daily-grids-${tf}`, `chart-daily-grids-${tf}`, `d-${tf}`, rows, 'total_days', 'up_days', 'down_days');
    }

    // Render 4h grids
    for (const tf of FOURH_TIMEFRAMES) {
      const rows = (fourhData[tf] || []).filter(r => r.ticker === ticker);
      renderGrid(`grid-fourh-grids-${tf}`, `chart-fourh-grids-${tf}`, `4h-${tf}`, rows, 'total', 'up', 'down');
    }

    renderInsights(ticker);
  }

  function renderGrid(tbodyId, chartId, chartKey, rows, totalCol, upCol, downCol) {
    const tbody = document.getElementById(tbodyId);
    if (!tbody) return;

    tbody.innerHTML = rows.map(r => {
      const bg = r.up_pct > 55 ? 'table-success' : (r.up_pct < 45 ? 'table-danger' : '');
      const cls = r.up_pct > 53 ? 'text-success fw-bold' : (r.up_pct < 47 ? 'text-danger fw-bold' : '');
      return `<tr class="${bg}">
        <td class="ps-2">${r.bucket}-${r.bucket+10}%</td>
        <td class="text-end">${r[totalCol]}</td>
        <td class="text-end text-success">${r[upCol]}</td>
        <td class="text-end text-danger">${r[downCol]}</td>
        <td class="text-end pe-2 ${cls}">${r.up_pct}%</td>
      </tr>`;
    }).join('');

    // Chart
    const canvas = document.getElementById(chartId);
    if (!canvas) return;
    const labels = rows.map(r => `${r.bucket}%`);
    const values = rows.map(r => r.up_pct);
    const ctx = canvas.getContext('2d');
    if (charts[chartKey]) charts[chartKey].destroy();
    charts[chartKey] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{ data: values,
          backgroundColor: values.map(v => v >= 53 ? 'rgba(25,135,84,0.7)' : (v <= 47 ? 'rgba(220,53,69,0.7)' : 'rgba(108,117,125,0.3)')) }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { min: 38, max: 65, ticks: { callback: v => v + '%', font: { size: 10 } } }, x: { ticks: { font: { size: 9 } } } },
        plugins: { legend: { display: false } },
      },
    });
  }

  function renderInsights(ticker) {
    const findBestWorst = (data, totalCol) => {
      if (!data || !data.length) return null;
      const best = data.reduce((a, c) => c.up_pct > a.up_pct ? c : a);
      const worst = data.reduce((a, c) => c.up_pct < a.up_pct ? c : a);
      return { best_pct: best.up_pct, best_bucket: `${best.bucket}-${best.bucket+10}%`, best_n: best[totalCol],
               worst_pct: worst.up_pct, worst_bucket: `${worst.bucket}-${worst.bucket+10}%`, worst_n: worst[totalCol] };
    };

    let html = `<h6 class="fw-semibold">${ticker.toUpperCase()} - Best & Worst Percentile Deciles</h6>`;
    html += '<table class="table table-sm mb-0"><thead><tr><th>Market</th><th>Timeframe</th><th class="text-success">Best Decile</th><th class="text-success">Up%</th><th class="text-danger">Worst Decile</th><th class="text-danger">Up%</th><th>Spread</th></tr></thead><tbody>';

    for (const tf of DAILY_TIMEFRAMES) {
      const rows = (dailyData[tf] || []).filter(r => r.ticker === ticker);
      const bw = findBestWorst(rows, 'total_days');
      if (bw) {
        html += `<tr><td>Daily</td><td>${LABELS[tf]}</td><td class="text-success">${bw.best_bucket} (${bw.best_n}d)</td><td class="text-success fw-bold">${bw.best_pct}%</td><td class="text-danger">${bw.worst_bucket} (${bw.worst_n}d)</td><td class="text-danger fw-bold">${bw.worst_pct}%</td><td class="fw-bold">${(bw.best_pct - bw.worst_pct).toFixed(1)}pp</td></tr>`;
      }
    }
    for (const tf of FOURH_TIMEFRAMES) {
      const rows = (fourhData[tf] || []).filter(r => r.ticker === ticker);
      const bw = findBestWorst(rows, 'total');
      if (bw) {
        html += `<tr><td>4h</td><td>${LABELS[tf]}</td><td class="text-success">${bw.best_bucket} (${bw.best_n})</td><td class="text-success fw-bold">${bw.best_pct}%</td><td class="text-danger">${bw.worst_bucket} (${bw.worst_n})</td><td class="text-danger fw-bold">${bw.worst_pct}%</td><td class="fw-bold">${(bw.best_pct - bw.worst_pct).toFixed(1)}pp</td></tr>`;
      }
    }
    html += '</tbody></table>';
    document.getElementById('insights').innerHTML = html;
  }
</script>
{{ end }}
